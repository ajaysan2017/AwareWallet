{% extends 'base_auth.html' %}
{% block title %}Password Reset Complete — AwareWallet{% endblock %}

{% block auth_content %}
<div class="auth-header">
  <div class="logo-mark" style="background:rgba(52,211,153,0.12);">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1 class="auth-title">Password reset!</h1>
  <p class="auth-subtitle">Your password has been successfully reset. You can now log in with your new password.</p>
</div>
<a href="{% url 'login' %}" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
  Go to Login
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
</a>
{% endblock %}
