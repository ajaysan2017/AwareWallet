{% extends 'base_auth.html' %}
{% block title %}Check Your Email — AwareWallet{% endblock %}

{% block auth_content %}
<div class="auth-header">
  <div class="logo-mark" style="background:var(--accent-dim);">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </div>
  <h1 class="auth-title">Check your email</h1>
  <p class="auth-subtitle">We've sent a password reset link to your email address. Check your inbox and follow the instructions.</p>
</div>
<p class="auth-switch"><a href="{% url 'login' %}">← Back to login</a></p>
{% endblock %}
