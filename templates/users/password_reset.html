{% extends 'base_auth.html' %}
{% block title %}Reset Password — AwareWallet{% endblock %}

{% block auth_content %}
<div class="auth-header">
  <div class="logo-mark">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#1a1f2e"/>
      <path d="M10 22 L16 14 L20 19 L24 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="26" cy="13" r="2" fill="#34d399"/>
    </svg>
  </div>
  <h1 class="auth-title">Reset Password</h1>
  <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
</div>

<form method="POST" class="auth-form">
  {% csrf_token %}
  <div class="field-group">
    <label for="id_email">Email</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" name="email" id="id_email" placeholder="you@example.com" autofocus>
    </div>
    {% if form.email.errors %}
      <span class="field-error">{{ form.email.errors.0 }}</span>
    {% endif %}
  </div>
  <button type="submit" class="btn-primary">
    Send Reset Link
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</form>

<p class="auth-switch"><a href="{% url 'login' %}">← Back to login</a></p>
{% endblock %}
